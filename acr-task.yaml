version: v1.1.0
stepTimeout: 600
steps:
  # Build the application image
  - build: -t {{.Run.Registry}}/webapp:{{.Run.ID}} 
           -t {{.Run.Registry}}/webapp:latest .
    id: build-app
    
  # Start container for testing
  - cmd: docker run -d --name test-container -p 3001:3000 
         {{.Run.Registry}}/webapp:{{.Run.ID}}
    id: start-test-container
    
  # Wait for application to start
  - cmd: sleep 10
    id: wait-for-startup
    
  # Run health check test
  - cmd: |
      curl -f http://localhost:3001/health || exit 1
      echo "Health check passed"
    id: health-check
    
  # Run application tests
  - cmd: docker exec test-container npm test
    id: run-tests
    when: ['health-check']
    
  # Stop and remove test container
  - cmd: |
      docker stop test-container
      docker rm test-container
    id: cleanup
    when: ['run-tests']
    
  # Push images only if tests pass
  - push: 
      - {{.Run.Registry}}/webapp:{{.Run.ID}}
      - {{.Run.Registry}}/webapp:latest
    id: push-images
    when: ['cleanup']

# Set build environment variables
env:
  - BUILD_VERSION={{.Run.ID}}
  - BUILD_DATE={{.Date}}
  - GIT_COMMIT={{.Commit}}
