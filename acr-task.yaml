version: v1.1.0
stepTimeout: 600

steps:
  - build: -t {{.Run.Registry}}/webapp:{{.Run.ID}} -t {{.Run.Registry}}/webapp:latest .
    id: build-app

  - cmd: docker run -d --name test-container -p 3001:3000 {{.Run.Registry}}/webapp:{{.Run.ID}}
    id: start-test-container

  - cmd: ["sleep","10"]
    id: wait-for-startup
    image: mcr.microsoft.com/azure-cli

  - cmd: ["curl","-f","http://localhost:3001/health"]
    id: health-check
    image: mcr.microsoft.com/azure-cli

  - cmd: docker exec test-container npm test
    id: run-tests
    when: ['health-check']

  - cmd: docker stop test-container && docker rm test-container
    id: cleanup
    when: ['run-tests']

  - push:
      - {{.Run.Registry}}/webapp:{{.Run.ID}}
      - {{.Run.Registry}}/webapp:latest
    id: push-images
    when: ['cleanup']

env:
  - BUILD_VERSION={{.Run.ID}}
  - BUILD_DATE={{.Date}}
  - GIT_COMMIT={{.Commit}}
