version: v1.1.0
stepTimeout: 600

steps:
  - build: -t {{.Run.Registry}}/webapp:{{.Run.ID}} -t {{.Run.Registry}}/webapp:latest .
    id: build-app

  # Note: In ACR Tasks, we usually use 'detach: true' instead of 'docker run -d'
  - detach: true
    alias: test-app
    image: {{.Run.Registry}}/webapp:{{.Run.ID}}
    id: start-test-container

  - cmd: ["sh", "-c", "sleep 10"]
    id: wait-for-startup
    image: mcr.microsoft.com/azure-cli

  - cmd: ["sh", "-c", "curl -f http://test-app:3000/health"]
    id: health-check
    image: mcr.microsoft.com/azure-cli

  - cmd: ["sh", "-c", "docker exec start-test-container npm test"]
    id: run-tests
    when: ['health-check']

  - cmd: ["sh", "-c", "docker stop start-test-container && docker rm start-test-container"]
    id: cleanup
    when: ['run-tests']

  - push:
      - {{.Run.Registry}}/webapp:{{.Run.ID}}
      - {{.Run.Registry}}/webapp:latest
    id: push-images
    when: ['cleanup']
